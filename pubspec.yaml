name: quran_dawah
description: An Islamic application (Quran & Dawah) in Amharic and Oromo languages.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter_skill: ^0.2.6
  flutter:
    sdk: flutter
  scrollable_positioned_list: ^0.3.8
  shared_preferences: ^2.0.0
  share_plus: ^10.0.0
  qcf_quran: ^0.0.5
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.3
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  just_audio: ^0.10.5
  http: ^1.2.0
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/quran.json
    - assets/images/
    - assets/images/
  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
